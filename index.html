<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tom Scholtes — Personal site, live CV, and notes on AI in finance ops</title>
<meta name="description" content="Tom Scholtes — SPV Controller in Luxembourg. Personal site, live CV, and a portfolio of automation work I've built inside my role." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<style>
  :root {
    --bg: #F6F2EC;
    --bg-2: #EFE8DD;
    --ink: #0E0E0C;
    --ink-2: #2A2A28;
    --muted: #6B6963;
    --rule: #1f1f1c1a;
    --accent: #C4623A;
    --accent-ink: #8A3F1E;
    --deep: #1B2B4B;
    --ok: #2F6B4F;
    --pad-y: clamp(80px, 9vw, 140px);
    --container: 1200px;
    --gap: 24px;
  }
  [data-theme="dark"] {
    --bg: #0E0E0C;
    --bg-2: #181815;
    --ink: #F4EFE6;
    --ink-2: #D6D1C7;
    --muted: #8E8B82;
    --rule: #ffffff1a;
    --accent: #E37B4F;
    --accent-ink: #F0A07F;
    --deep: #C9D5EE;
  }
  [data-theme="ink"] {
    --bg: #0E1726;
    --bg-2: #15233A;
    --ink: #EAF0FA;
    --ink-2: #C7D2E5;
    --muted: #7C8DAA;
    --rule: #ffffff14;
    --accent: #E8B25A;
    --accent-ink: #F5C97A;
    --deep: #EAF0FA;
  }
  [data-density="compact"] { --pad-y: clamp(56px, 6vw, 96px); }
  [data-density="airy"]    { --pad-y: clamp(96px, 11vw, 180px); }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: var(--bg); }

  .container { max-width: var(--container); margin: 0 auto; padding: 0 28px; }
  .serif { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before {
    content: "";
    width: 22px; height: 1px; background: currentColor; opacity: .5;
  }

  /* scroll-reveal: sections fade up as they enter the viewport. The .reveal
     class is added by React on mount; if JS is off, nothing hides — so the
     content always shows. */
  .reveal {
    opacity: 0;
    transform: translateY(22px);
    transition: opacity .85s cubic-bezier(.2,.7,.2,1), transform .85s cubic-bezier(.2,.7,.2,1);
    will-change: opacity, transform;
  }
  .reveal.is-visible { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1; transform: none; transition: none; }
  }

  /* nav */
  .nav {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(14px);
    background: color-mix(in oklab, var(--bg) 78%, transparent);
    border-bottom: 1px solid var(--rule);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 68px; }
  .brand { display: flex; align-items: center; gap: 12px; font-weight: 600; letter-spacing: -0.01em; }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--ink); color: var(--bg);
    display: grid; place-items: center;
    font-family: 'Instrument Serif', serif; font-size: 18px; line-height: 1;
    font-style: italic;
  }
  .nav-links { display: flex; gap: 28px; align-items: center; color: var(--ink-2); font-size: 14px; }
  .nav-links a:hover { color: var(--ink); }
  .nav-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 14px; border-radius: 999px;
    background: var(--ink); color: var(--bg);
    font-size: 13px; font-weight: 500;
    transition: transform .15s ease;
    white-space: nowrap;
  }
  .nav-cta:hover { transform: translateY(-1px); }

  /* hamburger button — hidden on desktop */
  .nav-toggle {
    display: none;
    align-items: center; justify-content: center;
    width: 40px; height: 40px;
    margin-left: 8px;
    padding: 0;
    background: transparent; border: 1px solid var(--rule); border-radius: 8px;
    cursor: pointer;
    transition: border-color .15s ease;
  }
  .nav-toggle:hover { border-color: var(--ink); }
  .nav-toggle .bar {
    display: block; width: 16px; height: 1.5px;
    background: var(--ink);
    margin: 2.5px 0;
    transition: transform .2s ease, opacity .2s ease;
  }
  .nav[data-open="true"] .nav-toggle .bar:nth-child(1) { transform: translateY(4px) rotate(45deg); }
  .nav[data-open="true"] .nav-toggle .bar:nth-child(2) { opacity: 0; }
  .nav[data-open="true"] .nav-toggle .bar:nth-child(3) { transform: translateY(-4px) rotate(-45deg); }

  @media (max-width: 720px) {
    .nav-toggle { display: inline-flex; }
    .nav-cta { display: none; }
    .nav-links {
      display: none;
      position: fixed;
      inset: 68px 0 auto 0;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      padding: 8px 28px 24px;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      z-index: 50;
      max-height: calc(100vh - 68px);
      overflow-y: auto;
    }
    .nav[data-open="true"] .nav-links { display: flex; }
    .nav-links a {
      width: 100%;
      padding: 14px 0;
      border-bottom: 1px solid var(--rule);
      font-size: 16px;
      color: var(--ink);
    }
    .nav-links a:last-child { border-bottom: 0; }
  }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px; border-radius: 999px;
    font-size: 15px; font-weight: 500;
    border: 1px solid transparent;
    transition: all .18s ease;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover { background: var(--accent-ink); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--rule); }
  .btn-ghost:hover { border-color: var(--ink); }
  .btn .arr { transition: transform .2s ease; }
  .btn:hover .arr { transform: translateX(3px); }

  /* sections */
  section { padding: var(--pad-y) 0; border-top: 1px solid var(--rule); }
  section:first-of-type { border-top: 0; }

  /* hero */
  .hero { padding-top: clamp(60px, 8vw, 110px); padding-bottom: clamp(40px, 6vw, 80px); }
  .hero-grid { display: grid; grid-template-columns: 1.15fr .85fr; gap: 64px; align-items: end; }
  @media (max-width: 980px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }
  .hero h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(48px, 7.2vw, 104px);
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin: 24px 0 0;
    text-wrap: balance;
  }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero .lead {
    margin-top: 28px;
    font-size: clamp(17px, 1.4vw, 19px);
    color: var(--ink-2); max-width: 52ch;
    text-wrap: pretty;
  }
  .hero-actions { margin-top: 36px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .hero-meta {
    display: flex; gap: 28px; margin-top: 44px; padding-top: 28px;
    border-top: 1px solid var(--rule);
    color: var(--muted); font-size: 13px;
  }
  .hero-meta strong { color: var(--ink); display: block; font-weight: 600; font-size: 22px; font-family: 'Instrument Serif', serif; letter-spacing: -0.01em; }

  .hero-card {
    background: var(--bg-2);
    border: 1px solid var(--rule);
    border-radius: 18px;
    padding: 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--ink-2);
    box-shadow: 0 30px 60px -30px rgba(0,0,0,.18);
  }
  .hero-card .head {
    display: flex; align-items: center; justify-content: space-between;
    color: var(--muted); margin-bottom: 14px;
  }
  .dots { display: inline-flex; gap: 5px; }
  .dots i { width: 8px; height: 8px; border-radius: 50%; background: var(--rule); display: block; }
  .dots i:nth-child(1) { background: #E08C7A; }
  .dots i:nth-child(2) { background: #E8C277; }
  .dots i:nth-child(3) { background: #8FB48E; }

  .flow { display: grid; gap: 10px; }
  .flow-row {
    display: grid; grid-template-columns: 18px 1fr auto; gap: 12px; align-items: center;
    padding: 10px 12px; background: var(--bg);
    border: 1px solid var(--rule); border-radius: 10px;
  }
  .flow-row.done { border-color: color-mix(in oklab, var(--ok) 50%, var(--rule)); }
  .flow-row.live { border-color: color-mix(in oklab, var(--accent) 60%, var(--rule)); background: color-mix(in oklab, var(--accent) 6%, var(--bg)); }
  .flow-tick { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--rule); display: grid; place-items: center; }
  .flow-row.done .flow-tick { background: var(--ok); border-color: var(--ok); color: white; }
  .flow-row.live .flow-tick {
    border-color: var(--accent);
    background: radial-gradient(circle, var(--accent) 0%, var(--accent) 35%, transparent 36%);
  }
  .flow-tick svg { width: 9px; height: 9px; }
  .flow-tag { font-size: 10.5px; padding: 2px 6px; border-radius: 4px; background: var(--bg-2); color: var(--muted); }
  .flow-row.done .flow-tag { background: color-mix(in oklab, var(--ok) 18%, var(--bg-2)); color: var(--ok); }
  .flow-row.live .flow-tag { background: color-mix(in oklab, var(--accent) 22%, var(--bg-2)); color: var(--accent-ink); }
  .flow-arrow { display: grid; place-items: center; color: var(--muted); height: 8px; }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; box-shadow: 0 0 0 0 var(--accent); animation: pulse 1.6s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 60%, transparent); }
    100% { box-shadow: 0 0 0 12px transparent; }
  }
  .hero-card .foot {
    margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--rule);
    display: flex; justify-content: space-between; color: var(--muted);
  }
  .hero-card .foot strong { color: var(--ok); font-weight: 500; }

  /* logo strip */
  .marquee {
    padding: 22px 0 18px;
    display: flex; gap: 56px; flex-wrap: wrap; align-items: center; justify-content: space-between;
    color: var(--muted);
  }
  .marquee .label { font-size: 12px; text-transform: uppercase; letter-spacing: .12em; font-family: 'JetBrains Mono', monospace; flex: 0 0 100%; margin-bottom: 4px; opacity: .8; }
  .marquee .logos { display: flex; gap: 48px; flex-wrap: wrap; align-items: center; opacity: .85; }
  .marquee .logo {
    font-family: 'Instrument Serif', serif; font-size: 22px; font-style: italic; letter-spacing: -.01em;
    color: var(--ink); opacity: .7;
  }
  .marquee .logo.sans { font-family: 'Inter'; font-style: normal; font-weight: 700; letter-spacing: -.02em; }
  .marquee .logo.mono { font-family: 'JetBrains Mono', monospace; font-style: normal; font-size: 16px; font-weight: 500; }

  /* generic section heads */
  .sec-head { display: grid; grid-template-columns: 1fr 1.4fr; gap: 64px; align-items: end; margin-bottom: 56px; }
  @media (max-width: 860px) { .sec-head { grid-template-columns: 1fr; gap: 18px; margin-bottom: 36px; } }
  .sec-head h2 {
    font-family: 'Instrument Serif', serif; font-weight: 400;
    font-size: clamp(36px, 4.6vw, 64px);
    line-height: 1.02;
    letter-spacing: -0.02em;
    margin: 16px 0 0;
    text-wrap: balance;
  }
  .sec-head .blurb { color: var(--ink-2); font-size: 17px; max-width: 52ch; text-wrap: pretty; }

  /* services */
  .services { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--rule); border: 1px solid var(--rule); border-radius: 18px; overflow: hidden; }
  @media (max-width: 760px) { .services { grid-template-columns: 1fr; } }
  .svc { background: var(--bg); padding: 36px; display: flex; flex-direction: column; gap: 14px; min-height: 280px; }
  .svc:hover { background: var(--bg-2); }
  .svc-num { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }
  .svc h3 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 30px; line-height: 1.1; margin: 0; letter-spacing: -.01em; }
  .svc p { color: var(--ink-2); font-size: 15px; margin: 0; }
  .svc .tags { margin-top: auto; display: flex; flex-wrap: wrap; gap: 6px; }
  .svc .tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 4px 8px; border: 1px solid var(--rule); border-radius: 4px; color: var(--muted); }
  .svc-mark { width: 32px; height: 32px; color: var(--accent); }

  /* process */
  .process { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; }
  @media (max-width: 900px) { .process { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .process { grid-template-columns: 1fr; } }
  .step { border-top: 1px solid var(--ink); padding-top: 18px; }
  .step .n { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 12px; letter-spacing: .08em; }
  .step h4 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 26px; margin: 12px 0 8px; line-height: 1.1; letter-spacing: -.01em; }
  .step p { color: var(--ink-2); font-size: 14.5px; margin: 0; }
  .step .dur { margin-top: 14px; font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  /* results */
  .results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--rule); border-radius: 18px; overflow: hidden; border: 1px solid var(--rule); }
  @media (max-width: 860px) { .results { grid-template-columns: 1fr; } }
  .res { background: var(--bg); padding: 40px 32px 32px; }
  .res .num { font-family: 'Instrument Serif', serif; font-size: clamp(64px, 7vw, 96px); line-height: 0.95; letter-spacing: -.03em; }
  .res .num em { font-style: italic; color: var(--accent); }
  .res .lbl { margin-top: 14px; font-weight: 500; font-size: 16px; }
  .res .who { margin-top: 4px; color: var(--muted); font-size: 13px; font-family: 'JetBrains Mono', monospace; }

  /* about */
  .about-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 56px; }
  @media (max-width: 860px) { .about-grid { grid-template-columns: 1fr; gap: 36px; } }
  .portrait {
    aspect-ratio: 4/5; border-radius: 14px; background: var(--bg-2);
    border: 1px solid var(--rule);
    background-image:
      radial-gradient(circle at 50% 36%, color-mix(in oklab, var(--accent) 18%, var(--bg-2)) 0%, var(--bg-2) 55%),
      linear-gradient(180deg, var(--bg-2), var(--bg));
    position: relative; overflow: hidden;
  }
  .portrait::after {
    content: "TS";
    position: absolute; inset: 0; display: grid; place-items: center;
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: 22vw; color: color-mix(in oklab, var(--ink) 12%, transparent);
    line-height: 1;
  }
  @media (min-width: 861px) { .portrait::after { font-size: 9vw; } }
  .portrait .badge {
    position: absolute; left: 14px; bottom: 14px; z-index: 2;
    background: var(--bg); border: 1px solid var(--rule); border-radius: 999px;
    padding: 6px 12px; font-size: 11.5px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
  }
  .about h2 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(34px, 4.2vw, 56px); margin: 14px 0 24px; line-height: 1.04; letter-spacing: -.02em; }
  .about p { color: var(--ink-2); font-size: 17px; max-width: 60ch; }
  .about p + p { margin-top: 14px; }
  .creds { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 36px; padding-top: 28px; border-top: 1px solid var(--rule); }
  @media (max-width: 540px) { .creds { grid-template-columns: repeat(2, 1fr); } }
  .creds dt { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
  .creds dd { margin: 6px 0 0; font-weight: 500; }

  /* testimonials */
  .quote {
    font-family: 'Instrument Serif', serif; font-weight: 400;
    font-size: clamp(28px, 3.4vw, 44px); line-height: 1.18; letter-spacing: -.01em;
    text-wrap: balance;
  }
  .quote em { font-style: italic; color: var(--accent); }
  .quotes { display: grid; grid-template-columns: 1.3fr 1fr; gap: 56px; }
  @media (max-width: 860px) { .quotes { grid-template-columns: 1fr; gap: 32px; } }
  .quote-meta { margin-top: 28px; display: flex; align-items: center; gap: 14px; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--bg-2); border: 1px solid var(--rule); display: grid; place-items: center; font-family: 'Instrument Serif', serif; font-style: italic; }
  .quote-side { display: flex; flex-direction: column; gap: 18px; }
  .qcard { padding: 24px; background: var(--bg-2); border: 1px solid var(--rule); border-radius: 14px; }
  .qcard p { margin: 0; font-size: 15.5px; line-height: 1.5; }
  .qcard .who { margin-top: 14px; font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  /* faq */
  .faq { display: grid; grid-template-columns: 1fr 1.6fr; gap: 56px; }
  @media (max-width: 860px) { .faq { grid-template-columns: 1fr; } }
  details { border-top: 1px solid var(--rule); padding: 22px 0; cursor: pointer; }
  details:last-of-type { border-bottom: 1px solid var(--rule); }
  details summary { list-style: none; display: flex; justify-content: space-between; align-items: center; gap: 16px; font-weight: 500; font-size: 18px; }
  details summary::-webkit-details-marker { display: none; }
  details summary .plus { width: 22px; height: 22px; flex: 0 0 22px; border: 1px solid var(--rule); border-radius: 50%; display: grid; place-items: center; transition: transform .2s ease, background .2s ease; color: var(--ink-2); }
  details[open] summary .plus { transform: rotate(45deg); background: var(--ink); color: var(--bg); border-color: var(--ink); }
  details p { margin: 14px 0 0; color: var(--ink-2); font-size: 15.5px; max-width: 64ch; }

  /* cta */
  .cta-card {
    background: var(--ink); color: var(--bg);
    border-radius: 22px;
    padding: clamp(40px, 6vw, 80px);
    display: grid; grid-template-columns: 1.3fr 1fr; gap: 40px; align-items: end;
    position: relative; overflow: hidden;
  }
  [data-theme="dark"] .cta-card, [data-theme="ink"] .cta-card { background: var(--bg-2); color: var(--ink); border: 1px solid var(--rule); }
  @media (max-width: 760px) { .cta-card { grid-template-columns: 1fr; } }
  .cta-card h2 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(38px, 5vw, 72px); line-height: 1; letter-spacing: -.02em; margin: 0; text-wrap: balance; }
  .cta-card h2 em { font-style: italic; color: var(--accent); }
  .cta-card .right { display: flex; flex-direction: column; gap: 18px; align-items: flex-start; }
  .cta-card .right p { margin: 0; opacity: .8; max-width: 40ch; }
  .cta-card .btn-primary { background: var(--accent); color: #1a0a04; }
  .cta-card .btn-primary:hover { background: #d57c54; }
  .cta-card .btn-ghost { color: inherit; border-color: color-mix(in oklab, currentColor 25%, transparent); }
  .cta-bg {
    position: absolute; right: -8%; bottom: -40%;
    font-family: 'Instrument Serif', serif; font-style: italic;
    font-size: clamp(220px, 28vw, 440px); line-height: 1;
    color: color-mix(in oklab, var(--accent) 18%, transparent);
    pointer-events: none; user-select: none;
  }

  /* case studies */
  .cases { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--rule); border: 1px solid var(--rule); border-radius: 18px; overflow: hidden; }
  @media (max-width: 760px) { .cases { grid-template-columns: 1fr; } }
  .case { background: var(--bg); padding: 32px; display: flex; flex-direction: column; gap: 14px; min-height: 280px; }
  .case:hover { background: var(--bg-2); }
  .case-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .case-metric { text-align: right; }
  .case-metric-num { font-family: 'Instrument Serif', serif; font-size: 32px; line-height: 1; letter-spacing: -.02em; color: var(--accent); }
